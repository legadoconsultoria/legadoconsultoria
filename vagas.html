<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagas | Legado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        header { background-color: #0A2540; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo img { height: 50px; }
        .btn-voltar { border: 1.5px solid white; color: white; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 600; }
        .page-header { background: #1a3a5f; color: white; text-align: center; padding: 4rem 5%; }
        .vagas-container { max-width: 900px; margin: 4rem auto; padding: 0 5%; display: flex; flex-direction: column; gap: 2rem; }
        .vaga-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #118AB2; }
        .btn-aplicar { display: inline-block; background-color: #118AB2; color: white; padding: 0.8rem 2rem; border-radius: 4px; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body style="background-color: #f9fbfd;">
    <header>
        <div class="logo"><img src="logo.png" alt="Legado Logo"></div>
        <nav><a href="index.html" class="btn-voltar">← Voltar ao Início</a></nav>
    </header>

    <div class="page-header">
        <h1>Oportunidades em Aberto</h1>
    </div>

    <main class="vagas-container" id="lista-vagas"></main>

    <script src="dados_vagas.js"></script>
    <script>
        const container = document.getElementById('lista-vagas');
        if (typeof vagasAbertas === 'undefined' || vagasAbertas.length === 0) {
            container.innerHTML = "<p style='text-align:center'>Nenhuma vaga no momento.</p>";
        } else {
            vagasAbertas.forEach(vaga => {
                container.innerHTML += `
                    <div class="vaga-card">
                        <h2>${vaga.titulo}</h2>
                        <p style="color:#118AB2; font-weight:bold">${vaga.cidade}</p>
                        <p style="margin: 10px 0">${vaga.descricao}</p>
                        <a href="${vaga.link}" target="_blank" class="btn-aplicar">Tenho Interesse</a>
                    </div>`;
            });
        }
    </script>
</body>
</html>
